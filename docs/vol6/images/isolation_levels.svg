<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 760 275" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:760px;display:block;margin:16px 0;">
<style>
@keyframes isoRowPulse { 0%,100%{opacity:0.85} 50%{opacity:1} }
</style>
<rect width="760" height="275" rx="10" fill="#f8fafc"/>
<text x="380" y="24" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#1e293b">Transaction isolation levels — anomaly matrix</text>
<!-- Column headers -->
<rect x="14" y="34" width="210" height="30" rx="4" fill="#1e293b"/>
<text x="119" y="53" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#f8fafc">Isolation level</text>
<rect x="228" y="34" width="125" height="30" rx="4" fill="#334155"/>
<text x="290" y="46" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#f8fafc">Dirty read</text>
<text x="290" y="58" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#cbd5e1">reads uncommitted data</text>
<rect x="357" y="34" width="125" height="30" rx="4" fill="#334155"/>
<text x="419" y="46" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#f8fafc">Non-repeatable</text>
<text x="419" y="58" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#cbd5e1">row changes mid-tx</text>
<rect x="486" y="34" width="125" height="30" rx="4" fill="#334155"/>
<text x="548" y="46" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#f8fafc">Phantom read</text>
<text x="548" y="58" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#cbd5e1">new rows appear</text>
<rect x="615" y="34" width="131" height="30" rx="4" fill="#334155"/>
<text x="680" y="46" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#f8fafc">Write skew</text>
<text x="680" y="58" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#cbd5e1">concurrent constraint break</text>

<!-- ── ROW 1: READ UNCOMMITTED ── -->
<rect x="14" y="68" width="210" height="44" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
<text x="119" y="86" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#991b1b">READ UNCOMMITTED</text>
<text x="119" y="101" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#b91c1c">lowest isolation · highest concurrency</text>
<!-- All red (all anomalies possible) -->
<rect x="228" y="68" width="125" height="44" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
<text x="290" y="95" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#dc2626">✗</text>
<rect x="357" y="68" width="125" height="44" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
<text x="419" y="95" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#dc2626">✗</text>
<rect x="486" y="68" width="125" height="44" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
<text x="548" y="95" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#dc2626">✗</text>
<rect x="615" y="68" width="131" height="44" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
<text x="680" y="95" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#dc2626">✗</text>

<!-- ── ROW 2: READ COMMITTED ── -->
<rect x="14" y="116" width="210" height="44" rx="4" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
<text x="119" y="134" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#9a3412">READ COMMITTED</text>
<text x="119" y="149" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#78350f">PostgreSQL default · Oracle default</text>
<rect x="228" y="116" width="125" height="44" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
<text x="290" y="143" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#16a34a">✓</text>
<rect x="357" y="116" width="125" height="44" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
<text x="419" y="143" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#dc2626">✗</text>
<rect x="486" y="116" width="125" height="44" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
<text x="548" y="143" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#dc2626">✗</text>
<rect x="615" y="116" width="131" height="44" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
<text x="680" y="143" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#dc2626">✗</text>

<!-- ── ROW 3: REPEATABLE READ ── -->
<rect x="14" y="164" width="210" height="44" rx="4" fill="#fef9c3" stroke="#fde047" stroke-width="1.5"/>
<text x="119" y="182" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#854d0e">REPEATABLE READ</text>
<text x="119" y="197" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#713f12">MySQL InnoDB default</text>
<rect x="228" y="164" width="125" height="44" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
<text x="290" y="191" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#16a34a">✓</text>
<rect x="357" y="164" width="125" height="44" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
<text x="419" y="191" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#16a34a">✓</text>
<rect x="486" y="164" width="125" height="44" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
<text x="548" y="191" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#dc2626">✗</text>
<rect x="615" y="164" width="131" height="44" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
<text x="680" y="191" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#dc2626">✗</text>

<!-- ── ROW 4: SERIALIZABLE ── -->
<rect x="14" y="212" width="210" height="44" rx="4" fill="#dcfce7" stroke="#10b981" stroke-width="2" style="animation:isoRowPulse 3s ease-in-out infinite"/>
<text x="119" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#065f46">SERIALIZABLE</text>
<text x="119" y="245" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#047857">highest isolation · lowest concurrency</text>
<rect x="228" y="212" width="125" height="44" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
<text x="290" y="239" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#16a34a">✓</text>
<rect x="357" y="212" width="125" height="44" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
<text x="419" y="239" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#16a34a">✓</text>
<rect x="486" y="212" width="125" height="44" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
<text x="548" y="239" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#16a34a">✓</text>
<rect x="615" y="212" width="131" height="44" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
<text x="680" y="239" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#16a34a">✓</text>

<!-- Legend -->
<text x="14" y="268" font-family="sans-serif" font-size="8" fill="#94a3b8">✓ = anomaly prevented   ✗ = anomaly CAN occur   MySQL InnoDB REPEATABLE READ also prevents phantoms via gap locks (implementation exceeds SQL standard)</text>
</svg>