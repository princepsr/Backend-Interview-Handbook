[book]
title = "Volume 1: Core Java"
authors = ["Prince Singh"]
description = "Core Java fundamentals for SDE2 interviews. OOP, Collections, Java 8+, JVM Internals, Multithreading and Concurrency. 6 chapters, 100+ Q&As."
language = "en"
src = "."

[build]
build-dir = "../../docs/vol1"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
no-section-label = false
fold = { enable = true, level = 1 }
additional-css = ["custom.css"]
additional-js = ["custom.js"]

[output.html.print]
enable = true
page-break = true

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

