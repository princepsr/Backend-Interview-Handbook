<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 760 290" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:760px;display:block;margin:16px 0;">
<style>
@keyframes cacheHitReq {
  0%,5%  { opacity:0; }
  8%     { opacity:1; transform:translateX(0); }
  20%    { opacity:1; transform:translateX(138px); }
  22%,35%{ opacity:1; transform:translateX(138px); }
  48%    { opacity:1; transform:translateX(0); }
  54%,100%{ opacity:0; transform:translateX(0); }
}
@keyframes cacheMissReq {
  0%,50%  { opacity:0; }
  53%     { opacity:1; transform:translateX(0); }
  62%     { opacity:1; transform:translateX(138px); }
  65%,70% { opacity:1; transform:translateX(138px); }
  78%     { opacity:1; transform:translateX(270px); }
  81%,86% { opacity:1; transform:translateX(270px); }
  94%     { opacity:1; transform:translateX(0); }
  97%,100%{ opacity:0; transform:translateX(0); }
}
@keyframes hitBadge { 0%,20%{opacity:0} 25%,45%{opacity:1} 50%,100%{opacity:0} }
@keyframes missBadge { 0%,65%{opacity:0} 70%,88%{opacity:1} 92%,100%{opacity:0} }
</style>
<rect width="760" height="290" rx="10" fill="#f8fafc"/>
<text x="380" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#1e293b">Cache-aside (Lazy Loading) — hit vs miss flow</text>
<defs>
<marker id="ca" markerWidth="7" markerHeight="6" refX="5.5" refY="3" orient="auto"><polygon points="0 0,7 3,0 6" fill="#6366f1"/></marker>
<marker id="cag" markerWidth="7" markerHeight="6" refX="5.5" refY="3" orient="auto"><polygon points="0 0,7 3,0 6" fill="#10b981"/></marker>
<marker id="car" markerWidth="7" markerHeight="6" refX="5.5" refY="3" orient="auto"><polygon points="0 0,7 3,0 6" fill="#ef4444"/></marker>
<marker id="caa" markerWidth="7" markerHeight="6" refX="5.5" refY="3" orient="auto"><polygon points="0 0,7 3,0 6" fill="#f59e0b"/></marker>
</defs>

<!-- ── CACHE HIT LANE ── -->
<rect x="14" y="42" width="730" height="105" rx="6" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
<text x="30" y="60" font-family="sans-serif" font-size="10" font-weight="600" fill="#065f46">Cache HIT</text>
<rect x="106" y="58" width="42" height="14" rx="3" fill="#10b981"/>
<text x="127" y="69" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">fast</text>

<!-- App box (hit lane) -->
<rect x="30" y="68" width="90" height="62" rx="5" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
<text x="75" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#3730a3">Application</text>
<text x="75" y="103" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4338ca">1. get(key)</text>
<text x="75" y="116" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4338ca">6. use value</text>

<!-- Redis box (hit lane) -->
<rect x="182" y="68" width="90" height="62" rx="5" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
<text x="227" y="88" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#991b1b">Redis</text>
<text x="227" y="101" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#b91c1c">2. key found!</text>
<text x="227" y="113" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#b91c1c">HIT — return</text>
<text x="227" y="124" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#b91c1c">cached value</text>

<!-- HIT arrows -->
<path d="M120 90 L182 90" stroke="#6366f1" stroke-width="1.5" fill="none" marker-end="url(#ca)"/>
<text x="151" y="83" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4338ca">1. GET key</text>
<path d="M182 110 L120 110" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#cag)"/>
<text x="151" y="125" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#047857">2. value (HIT)</text>

<!-- DB box (greyed out — not reached on HIT) -->
<rect x="355" y="68" width="90" height="62" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" opacity="0.5"/>
<text x="400" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Database</text>
<text x="400" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#94a3b8">not reached</text>
<text x="400" y="118" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#94a3b8">on cache HIT</text>

<!-- X over DB arrow for HIT -->
<path d="M272 99 L355 99" stroke="#cbd5e1" stroke-width="1" fill="none" stroke-dasharray="4,4"/>
<text x="313" y="91" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ef4444">✕</text>

<!-- HIT latency note -->
<rect x="458" y="68" width="270" height="62" rx="5" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
<text x="593" y="87" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#065f46">Cache HIT result</text>
<text x="593" y="101" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#047857">Latency: ~0.1 ms (Redis in-memory)</text>
<text x="593" y="113" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#047857">No DB round trip · No SQL query</text>
<text x="593" y="125" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#047857">Hit rate target: 90–95 %+ in prod</text>

<!-- ── CACHE MISS LANE ── -->
<rect x="14" y="162" width="730" height="115" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
<text x="30" y="180" font-family="sans-serif" font-size="10" font-weight="600" fill="#92400e">Cache MISS</text>
<rect x="106" y="168" width="42" height="14" rx="3" fill="#ef4444"/>
<text x="127" y="179" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">slow</text>

<!-- App box (miss lane) -->
<rect x="30" y="185" width="90" height="78" rx="5" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
<text x="75" y="205" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#3730a3">Application</text>
<text x="75" y="218" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4338ca">1. get(key)</text>
<text x="75" y="230" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4338ca">4. query DB</text>
<text x="75" y="242" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4338ca">6. set(k,v,TTL)</text>
<text x="75" y="254" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4338ca">7. use value</text>

<!-- Redis box (miss lane) -->
<rect x="182" y="185" width="90" height="62" rx="5" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
<text x="227" y="205" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#991b1b">Redis</text>
<text x="227" y="218" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#b91c1c">2. key not found</text>
<text x="227" y="230" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#b91c1c">MISS — null</text>
<text x="227" y="244" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#10b981">5. SET key value</text>

<!-- DB box (miss lane) -->
<rect x="355" y="185" width="90" height="62" rx="5" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
<text x="400" y="205" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#3730a3">Database</text>
<text x="400" y="218" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4338ca">3. SELECT …</text>
<text x="400" y="230" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4338ca">returns row</text>

<!-- MISS arrows -->
<path d="M120 208 L182 208" stroke="#6366f1" stroke-width="1.5" fill="none" marker-end="url(#ca)"/>
<text x="151" y="201" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4338ca">1. GET key</text>
<path d="M182 225 L120 225" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#car)"/>
<text x="151" y="238" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#b91c1c">2. nil (MISS)</text>
<path d="M120 240 L355 240" stroke="#6366f1" stroke-width="1" fill="none" stroke-dasharray="3,2" marker-end="url(#ca)"/>
<text x="237" y="255" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4338ca">3. SQL query</text>
<path d="M355 220 L272 220" stroke="#10b981" stroke-width="1" fill="none" stroke-dasharray="3,2" marker-end="url(#cag)"/>
<text x="313" y="212" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#047857">4. result row</text>
<text x="313" y="223" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#047857">5. SET + TTL →</text>

<!-- MISS notes -->
<rect x="458" y="185" width="270" height="78" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
<text x="593" y="204" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#991b1b">Cache MISS result</text>
<text x="593" y="218" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#b91c1c">Latency: ~5–20 ms (DB round trip)</text>
<text x="593" y="230" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#b91c1c">App fetches from DB, populates cache</text>
<text x="593" y="242" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#b91c1c">Next call for same key → HIT</text>
<text x="593" y="254" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#b91c1c">Set TTL to avoid stale data</text>
</svg>