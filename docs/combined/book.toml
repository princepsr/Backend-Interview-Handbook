[book]
title = "Java Backend Interview Handbook"
authors = ["Prince Singh"]
description = "Complete SDE2 interview preparation guide for Java Backend — FAANG+, FinTech & SaaS. Java 17 / Spring Boot 3.x. 27 chapters, 400+ questions."
language = "en"
src = "."

[build]
build-dir = "docs/combined"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = ""
no-section-label = false
fold = { enable = true, level = 1 }
additional-css = ["custom.css"]
additional-js = ["custom.js"]

[output.html.print]
enable = true
page-break = true

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

# [output.pdf] disabled — headless Chrome times out on large books
# To re-enable: uncomment the block below
# [output.pdf]
# enable = true
# output-filename = "Java_Backend_Interview_Handbook.pdf"
# print-background = true
# prefer-css-page-size = true
# landscape = false
# display-header-footer = false