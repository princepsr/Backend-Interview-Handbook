[book]
title = "Volume 5: System Design and LLD"
authors = ["Prince Singh"]
description = "Design Patterns, SOLID, LLD Case Studies and System Design HLD for SDE2 interviews. 4 chapters."
language = "en"
src = "."

[build]
build-dir = "../../docs/vol5"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
no-section-label = false
fold = { enable = true, level = 1 }
additional-css = ["custom.css"]
additional-js = ["custom.js"]

[output.html.print]
enable = true
page-break = true

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

